<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAST User Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    
    <a href="https://kast.xyz" class="title-link">
        <div class="header-frame">
            <h1 class="title">KAST USER CARD</h1>
        </div>
    </a>

    <div class="card-selector">
        <h3 class="selector-title">Choose Card Design</h3>
        <div class="card-grid">
            <div class="card-option active" data-card="1" data-name="Bitcoin Black">
                <img src="https://raw.githubusercontent.com/sery2013/kast-card/main/Bitcoin-Black-Card.png" alt="Bitcoin Black">
                <span class="card-label">Bitcoin Black</span>
            </div>
            <div class="card-option" data-card="2" data-name="Founders Edition">
                <img src="https://raw.githubusercontent.com/sery2013/kast-card/main/Founders-Edition.png" alt="Founders Edition">
                <span class="card-label">Founders</span>
            </div>
            <div class="card-option" data-card="3" data-name="K Card">
                <img src="https://raw.githubusercontent.com/sery2013/kast-card/main/K-Card.png" alt="K Card">
                <span class="card-label">K-Card</span>
            </div>
            <div class="card-option" data-card="4" data-name="Solana">
                <img src="https://raw.githubusercontent.com/sery2013/kast-card/main/Solana-Card.png" alt="Solana">
                <span class="card-label">Solana</span>
            </div>
            <div class="card-option" data-card="5" data-name="Solana Gold">
                <img src="https://raw.githubusercontent.com/sery2013/kast-card/main/Solana-Gold-Card.png" alt="Solana Gold">
                <span class="card-label">Solana Gold</span>
            </div>
            <div class="card-option" data-card="6" data-name="Solana Illuma">
                <img src="https://raw.githubusercontent.com/sery2013/kast-card/main/Solana-Illuma-Card.png" alt="Solana Illuma">
                <span class="card-label">Solana Illuma</span>
            </div>
            <div class="card-option" data-card="7" data-name="Solana Solid Gold">
                <img src="https://raw.githubusercontent.com/sery2013/kast-card/main/Solana-Solid-Gold-Card.png" alt="Solana Solid Gold">
                <span class="card-label">Solid Gold</span>
            </div>
            <div class="card-option" data-card="8" data-name="X Card">
                <img src="https://raw.githubusercontent.com/sery2013/kast-card/main/X-Card.png" alt="X Card">
                <span class="card-label">X-Card</span>
            </div>
            <div class="card-option" data-card="9" data-name="Design">
                <img src="https://raw.githubusercontent.com/sery2013/kast-card/main/design-card.png" alt="Design">
                <span class="card-label">Design</span>
            </div>
            <div class="card-option" data-card="10" data-name="Pengu Black">
                <img src="https://raw.githubusercontent.com/sery2013/kast-card/main/pengu-black.png" alt="Pengu Black">
                <span class="card-label">Pengu Black</span>
            </div>
            <div class="card-option" data-card="11" data-name="Pengu Gold">
                <img src="https://raw.githubusercontent.com/sery2013/kast-card/main/pengu-gold.png" alt="Pengu Gold">
                <span class="card-label">Pengu Gold</span>
            </div>
            <div class="card-option" data-card="12" data-name="Pengu White">
                <img src="https://raw.githubusercontent.com/sery2013/kast-card/main/pengu-white.png" alt="Pengu White">
                <span class="card-label">Pengu White</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="panel">
            <div class="file-upload">
                <input type="file" id="avatar" accept="image/*">
                <label for="avatar" class="file-upload-btn">📁 Choose Avatar</label>
            </div>
            <input type="text" id="username" placeholder="Username" maxlength="20">
            <input type="text" id="date" class="flatpickr-input" placeholder="Join Date" readonly>
            <input type="text" id="userBio" placeholder="Your bio..." maxlength="60">
            
            <!-- ПЕРЕКЛЮЧАТЕЛЬ ТЕМЫ -->
            <div class="theme-switcher">
                <label for="theme-mode">🎨 Text Theme:</label>
                <select id="theme-mode">
                    <option value="dark">Dark (White/Cyan)</option>
                    <option value="light">Light (Black/Teal)</option>
                </select>
            </div>

            <div class="roles">
                <label><input type="checkbox" value="@Staff"> @Staff</label>
                <label><input type="checkbox" value="@KAST Evangelist"> @KAST Evangelist</label>
                <label><input type="checkbox" value="@OG"> @OG</label>
                <label><input type="checkbox" value="@Kah-ching"> @Kah-ching</label>
                <label><input type="checkbox" value="@KAST Creator"> @KAST Creator</label>
                <label><input type="checkbox" value="@Member"> @Member</label>
            </div>
            
            <div class="button-group">
                <button onclick="generateCard()">Generate Card</button>
                <button onclick="downloadCard()">Download</button>
            </div>
        </div>

        <div class="preview-section">
            <div class="canvas-loader" id="skeleton">
                <span>Ready to build...</span>
            </div>
            <canvas id="cardCanvas" width="800" height="400" style="display: none;"></canvas>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 <a href="https://kast.xyz" class="footer-link">kast.xyz</a></p>
        <p>Developer: <a href="https://x.com/kaye_moni" class="twitter-link" target="_blank">@kaye_moni</a></p>
    </footer>

    <audio id="soundClick" src="sounds/click.mp3" preload="auto"></audio>
    <audio id="soundScan" src="sounds/scan.mp3" preload="auto"></audio>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>
    <script src="script.js"></script>
</body>
</html>
